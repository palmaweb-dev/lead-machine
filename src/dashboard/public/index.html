<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Machine Palmaweb — Painel de Controle</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<style>

body{
  font-family: Inter, sans-serif;
  background:#0a0a0f;
  color:#fff;
  margin:0;
}

.panel{
  background:#111118;
  border:1px solid rgba(174,105,231,0.15);
  border-radius:12px;
  padding:24px;
  margin:24px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:13px;
}

.btn{
  padding:10px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.btn-primary{
  background:linear-gradient(135deg,#372498,#ae69e7);
  color:white;
}

.btn-secondary{
  background:#1a1a24;
  color:white;
  border:1px solid rgba(255,255,255,0.1);
}

.btn-secondary:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.pagination{
  margin-top:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.pagination-info{
  margin-top:8px;
  font-size:12px;
  color:#888;
}

.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  background:rgba(174,105,231,0.15);
}

</style>
</head>

<body>

<div class="panel">

<h2>Leads</h2>

<table>
<thead>
<tr>
<th>Empresa</th>
<th>WhatsApp</th>
<th>Site</th>
<th>Score</th>
<th>Status</th>
<th>Interesse</th>
</tr>
</thead>

<tbody id="tabela-leads">
<tr>
<td colspan="6">Carregando...</td>
</tr>
</tbody>
</table>

<div class="pagination">

<button class="btn btn-secondary" id="btn-prev" onclick="mudarPagina(-1)">
Anterior
</button>

<span id="pagina-indicador">Página 1 de 1</span>

<button class="btn btn-secondary" id="btn-next" onclick="mudarPagina(1)">
Próxima
</button>

</div>

<div class="pagination-info" id="paginacao-resumo">
Mostrando 0 de 0 leads
</div>

</div>

<script>

const API_KEY = prompt('Senha do painel:') || '';

const h = {
  'Content-Type': 'application/json',
  'x-api-key': API_KEY
};

lucide.createIcons();

let paginaAtual = 0;
const leadsPorPagina = 30;
let totalPaginas = 1;
let totalLeads = 0;

async function carregarLeads(){

  const r = await fetch(`/api/leads?p=${paginaAtual}&limit=${leadsPorPagina}`, { headers:h });
  const resposta = await r.json();

  const tbody = document.getElementById('tabela-leads');

  totalPaginas = Math.max(1, resposta.total_paginas || 1);
  totalLeads = resposta.total || 0;

  if(paginaAtual > (totalPaginas - 1)){
    paginaAtual = totalPaginas - 1;
    return carregarLeads();
  }

  const leads = resposta.leads || [];

  if(leads.length === 0){
    tbody.innerHTML = `<tr><td colspan="6">Nenhum lead encontrado</td></tr>`;
    atualizarPaginacao();
    return;
  }

  tbody.innerHTML = leads.map(l => {

    const statusText = formatStatus(l.status);
    const interesseText = formatStatus(l.interesse || '');

    return `
      <tr>
        <td><strong>${l.nome_empresa}</strong></td>
        <td>${l.whatsapp || ''}</td>
        <td>${l.site ? `<a href="${l.site}" target="_blank">${truncate(l.site,30)}</a>` : ''}</td>
        <td>${getScore(l)}</td>
        <td><span class="badge">${statusText}</span></td>
        <td><span class="badge">${interesseText}</span></td>
      </tr>
    `;

  }).join('');

  atualizarPaginacao();

}

function atualizarPaginacao(){

  document.getElementById('pagina-indicador').textContent =
    `Página ${paginaAtual + 1} de ${totalPaginas}`;

  document.getElementById('btn-prev').disabled = paginaAtual <= 0;
  document.getElementById('btn-next').disabled = paginaAtual >= (totalPaginas - 1);

  const inicio = totalLeads === 0 ? 0 : (paginaAtual * leadsPorPagina) + 1;
  const fim = Math.min((paginaAtual + 1) * leadsPorPagina, totalLeads);

  document.getElementById('paginacao-resumo').textContent =
    `Mostrando ${inicio}-${fim} de ${totalLeads} leads`;

}

function mudarPagina(direcao){

  const proxima = paginaAtual + direcao;

  if(proxima < 0 || proxima >= totalPaginas) return;

  paginaAtual = proxima;

  carregarLeads();

}

function formatStatus(status){

  if(!status) return '';

  return status
    .replace(/_/g,' ')
    .replace(/\b\w/g,c => c.toUpperCase());

}

function truncate(str,max){

  if(!str) return '';

  return str.length > max
    ? str.substring(0,max) + '...'
    : str;

}

function getScore(lead){

  let score = null;

  if(lead.diagnosticos && Array.isArray(lead.diagnosticos) && lead.diagnosticos.length > 0){
    score = lead.diagnosticos[0].score;
  }
  else if(lead.diagnosticos && typeof lead.diagnosticos === 'object'){
    score = lead.diagnosticos.score;
  }

  if(score === null || score === undefined) return '—';

  let color = '#f87171';

  if(score >= 70) color = '#34d399';
  else if(score >= 40) color = '#fbbf24';

  return `<span style="font-weight:700;color:${color}">${score}</span>`;
}

carregarLeads();
setInterval(carregarLeads,15000);

</script>

</body>
</html>
